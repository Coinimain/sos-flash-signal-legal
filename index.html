    :root {
      --bg: #f7f7f8;

```
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, Helvetica, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px 18px;
}

.page {
  max-width: 760px;
  width: 100%;
}

.app-icon {
  width: 118px;
  height: 118px;
  margin: 0 auto 28px;
  border-radius: 28px;
  display: block;
  box-shadow: 0 18px 45px rgba(5, 8, 20, 0.18);
}

h1 {
  margin: 0;
  font-size: 36px;
  line-height: 1.15;
  letter-spacing: -0.03em;
}

.tagline {
  margin: 16px auto 34px;
  color: var(--muted);
  font-size: 18px;
  line-height: 1.55;
  max-width: 620px;
}

.buttons {
  display: flex;
  gap: 18px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 48px;
}

.button {
  display: inline-block;
  padding: 15px 24px;
  background: var(--card);
  color: #006aff;
  text-decoration: none;
  border-radius: 10px;
  font-size: 17px;
  box-shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.button:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(17, 24, 39, 0.12);
}

.button.primary {
  color: #ffffff;
  background: linear-gradient(135deg, var(--red), var(--amber));
  font-weight: 700;
}

.links {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 46px;
}

.link {
  color: #006aff;
  text-decoration: none;
  font-size: 15px;
}

.link:hover {
  text-decoration: underline;
}

footer {
  color: #7a808a;
  font-size: 15px;
}

@media (max-width: 520px) {
  h1 {
    font-size: 32px;
  }

  .tagline {
    font-size: 17px;
  }

  .button {
    width: 100%;
  }

  .buttons {
    gap: 12px;
  }
}
